version: '3.8'

services:
  chat-server:
    build: .
    container_name: chat-server
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3000
      - JWT_SECRET=change-this-secret-in-production
      - DB_PATH=./data/messages.db
    restart: unless-stopped
